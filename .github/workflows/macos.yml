name: pyficache (macos)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        os: [macOS]
        python-version: ['3.9', '3.10']
        # pip install --local -e "git+https://github.com/rocky/python-xdis.git#egg=xdis"
>>>>>>> master
        python -m pip install --upgrade pip
        pip install pytest
        pip install -e .[dev]
    - name: Test pyficache
      run: |
        make check
